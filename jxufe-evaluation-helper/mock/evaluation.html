<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>教学评价模拟页面</title>
  <style>
    body { font-family: sans-serif; margin: 30px; }
    table { border-collapse: collapse; width: 100%; }
    td, th { border: 1px solid #ccc; padding: 8px; }
    dialog { width: min(760px, 90vw); max-height: 80vh; overflow: auto; }
    fieldset { margin: 12px 0; }
    textarea { width: 100%; min-height: 70px; }
  </style>
</head>
<body>
  <h1>提交教学评价表</h1>
  <p>评价轮次：2025-2026学年第二学期期末评教</p>
  <button id="final-submit">提交</button>
  <table>
    <thead><tr><th>序号</th><th>课程/环节</th><th>教师</th><th>评价类型</th><th>评价得分</th><th>操作</th></tr></thead>
    <tbody id="courses"></tbody>
  </table>
  <iframe id="form-host" src="form-host.html" style="width: 100%; height: 700px; border: 0"></iframe>
  <script>
    window.mockSaved = [];
    window.mockFinalSubmitClicks = 0;
    window.mockRuntimeListener = null;
    window.mockActiveRow = null;
    window.chrome = {
      runtime: {
        sendMessage(message) {
          window.mockLastState = message.payload;
        },
        onMessage: {
          addListener(listener) {
            window.mockRuntimeListener = listener;
          }
        }
      }
    };

    const tbody = document.querySelector("#courses");
    for (let index = 1; index <= 10; index += 1) {
      tbody.insertAdjacentHTML("beforeend", `<tr><td>${index}</td><td>[100${index}]模拟课程${index}</td><td>教师${index}</td><td>理论</td><td class="score"></td><td><a href="#" class="evaluate">评价</a><span class="saved-action"></span></td></tr>`);
    }
    window.mockMarkSaved = function () {
      const row = window.mockActiveRow;
      setTimeout(() => {
        row.querySelector(".score").textContent = "95.00";
        row.querySelector(".saved-action").textContent = " 删除暂存";
      }, 700);
    };
    document.addEventListener("click", event => {
      if (event.target.matches(".evaluate")) {
        event.preventDefault();
        window.mockActiveRow = event.target.closest("tr");
        const host = document.querySelector("#form-host").contentDocument;
        const formDocument = host.querySelector("#evaluation-frame").contentDocument;
        formDocument.querySelector("#evaluation-dialog").showModal();
      }
    });
    document.querySelector("#final-submit").addEventListener("click", () => {
      window.mockFinalSubmitClicks += 1;
    });
  </script>
  <script src="../shared.js"></script>
  <script src="../content.js"></script>
  <script src="harness.js"></script>
</body>
</html>
